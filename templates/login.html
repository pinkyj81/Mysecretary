<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시간정원 - 로그인</title>
    <style>
        :root {
            --primary: #5A9FD4;
            --primary-strong: #2E5AA8;
            --line: #d9e3f4;
            --text: #1f2937;
            --muted: #6b7280;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at 0% 0%, #e6f2ff 0%, transparent 40%), #f0f5ff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text);
            padding: 12px;
        }
        .card {
            width: min(420px, 100%);
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 14px;
            box-shadow: 0 16px 36px rgba(46, 90, 168, 0.14);
            padding: 18px;
        }
        h1 {
            margin: 0 0 4px;
            font-size: 24px;
        }
        .sub {
            margin: 0 0 16px;
            color: var(--muted);
            font-size: 13px;
        }
        .error {
            background: #fff4f4;
            border: 1px solid #ffcaca;
            color: #b91c1c;
            border-radius: 10px;
            padding: 8px 10px;
            margin-bottom: 10px;
            font-size: 13px;
        }
        .field {
            display: grid;
            gap: 6px;
            margin-bottom: 10px;
        }
        .field label {
            font-size: 13px;
            color: #334155;
        }
        .field input {
            width: 100%;
            border: 1px solid #d5dfef;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
        }
        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 8px;
        }
        button {
            border: 1px solid var(--line);
            background: #fff;
            color: #334155;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            cursor: pointer;
        }
        .primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-strong) 100%);
            color: #fff;
            border-color: transparent;
        }
        .tip {
            margin-top: 10px;
            font-size: 12px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <form class="card" method="post">
        <h1>시간정원</h1>
        <p class="sub">로그인 후 개인 일정/루틴을 관리하세요.</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <input type="hidden" name="next" value="{{ next_url }}">

        <div class="field">
            <label for="username">아이디</label>
            <input id="username" name="username" autocomplete="username" required>
        </div>
        <div class="field">
            <label for="password">비밀번호</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>

        <div class="actions">
            <button type="submit" class="primary" name="mode" value="login">로그인</button>
            <button type="submit" name="mode" value="register">회원가입</button>
        </div>

        <div class="tip">처음 사용 시 회원가입 버튼으로 계정을 만들 수 있습니다.</div>
    </form>
</body>
</html>
