<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시간정원 - 일정 일괄 수정</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0" />
    <style>
        * { box-sizing: border-box; }

        :root {
            --primary: #5A9FD4;
            --primary-strong: #2E5AA8;
            --bg: #f3f6fb;
            --card: #ffffff;
            --line: #e6ebf3;
            --text: #1f2937;
            --muted: #6b7280;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at top left, #f8fbff 0%, var(--bg) 55%);
            color: var(--text);
        }

        .wrap {
            max-width: 1500px;
            margin: 0 auto;
            padding: 20px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: linear-gradient(135deg, #ffffff 0%, #f8fbff 100%);
            box-shadow: 0 8px 24px rgba(25, 45, 86, 0.06);
        }

        .title {
            font-size: 21px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1f2b3d;
        }

        .actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn {
            border: 1px solid var(--line);
            background: #fff;
            color: #334155;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: all 0.15s ease;
        }

        .btn:hover {
            border-color: #cfd8e6;
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(44, 72, 116, 0.08);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-strong) 100%);
            color: #fff;
            border-color: transparent;
        }

        .btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .filter-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding: 12px 14px;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: var(--card);
        }

        .filter-row input {
            width: 260px;
            max-width: 100%;
            border: 1px solid #d6deea;
            border-radius: 10px;
            padding: 8px 10px;
            font-size: 13px;
            background: #fff;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .filter-row input:focus {
            outline: none;
            border-color: #a9c4e7;
            box-shadow: 0 0 0 3px rgba(90, 159, 212, 0.14);
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            overflow: auto;
            max-height: calc(100vh - 165px);
            box-shadow: 0 12px 30px rgba(28, 46, 83, 0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1280px;
        }

        th, td {
            border-bottom: 1px solid #edf2f9;
            padding: 8px;
            font-size: 12px;
            white-space: nowrap;
            vertical-align: middle;
        }

        th {
            position: sticky;
            top: 0;
            background: linear-gradient(180deg, #fbfcff 0%, #f3f7fc 100%);
            z-index: 1;
            text-align: left;
            color: #4b5563;
            letter-spacing: 0.2px;
        }

        tbody tr:hover {
            background: #f8fbff;
        }

        td input[type="text"],
        td input[type="datetime-local"],
        td select {
            width: 100%;
            min-width: 120px;
            border: none;
            border-radius: 8px;
            padding: 6px;
            font-size: 12px;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
            background: transparent;
        }

        td input[type="text"]:focus,
        td input[type="datetime-local"]:focus,
        td select:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(90, 159, 212, 0.12);
            background: #fff;
        }

        td input[type="color"] {
            width: 42px;
            height: 30px;
            border: none;
            border-radius: 8px;
            background: transparent;
            padding: 2px;
        }
        .col-id { width: 64px; }
        .col-small { width: 86px; }
        .col-mid { width: 150px; }
        .col-actions { width: 150px; }
        .row-actions {
            display: flex;
            gap: 6px;
        }

        .row-actions button {
            border: 1px solid #d8deea;
            background: #fff;
            border-radius: 8px;
            padding: 6px 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .row-actions button:hover {
            transform: translateY(-1px);
        }

        .row-actions .save {
            border-color: #9ec0e6;
            color: #1f6eab;
            background: #f4f9ff;
        }

        .row-actions .del {
            border-color: #ffb5b5;
            color: #cc3b3b;
            background: #fff8f8;
        }

        .muted {
            color: var(--muted);
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 999px;
            background: #f4f6fa;
            border: 1px solid var(--line);
        }

        tr.dirty {
            background: linear-gradient(90deg, #fffdf3 0%, #fff 42%);
        }

        @media (max-width: 900px) {
            .wrap {
                padding: 12px;
            }

            .topbar {
                flex-direction: column;
                align-items: flex-start;
            }

            .actions {
                width: 100%;
                flex-wrap: wrap;
            }

            .filter-row {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="topbar">
            <div class="title">
                <span class="material-symbols-rounded">table_view</span>
                일정 일괄 수정
            </div>
            <div class="actions">
                <a class="btn" href="/desktop"><span class="material-symbols-rounded">calendar_month</span>달력으로</a>
                <button class="btn" id="saveAllBtn" onclick="saveAllRows()"><span class="material-symbols-rounded">save</span>일괄 저장</button>
                <a class="btn btn-primary" href="/desktop/create"><span class="material-symbols-rounded">add</span>새 일정</a>
            </div>
        </div>

        <div class="filter-row">
            <input id="searchInput" type="text" placeholder="제목/설명 검색">
            <span class="muted" id="countText">0건</span>
        </div>

        <div class="panel">
            <table>
                <thead>
                    <tr>
                        <th class="col-id">id</th>
                        <th class="col-small">check</th>
                        <th class="col-mid">title</th>
                        <th class="col-mid">description</th>
                        <th class="col-mid">start_date</th>
                        <th class="col-mid">end_date</th>
                        <th class="col-small">type</th>
                        <th class="col-small">color</th>
                        <th class="col-mid">created_at</th>
                        <th class="col-mid">updated_at</th>
                        <th class="col-actions">action</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let schedules = [];
        const dirtyIds = new Set();

        function toLocalInput(value) {
            if (!value) return '';
            return value.replace(' ', 'T').slice(0, 16);
        }

        async function loadRows() {
            const res = await fetch('/desktop/schedule');
            schedules = await res.json();
            renderRows();
        }

        function renderRows() {
            const keyword = (document.getElementById('searchInput').value || '').trim().toLowerCase();
            const rows = schedules.filter(item => {
                if (!keyword) return true;
                const title = (item.title || '').toLowerCase();
                const desc = (item.description || '').toLowerCase();
                return title.includes(keyword) || desc.includes(keyword);
            });

            document.getElementById('countText').textContent = `${rows.length}건`;

            const tbody = document.getElementById('tbody');
            tbody.innerHTML = rows.map(item => `
                <tr data-id="${item.id}">
                    <td>${item.id}</td>
                    <td><input type="checkbox" class="f-done" ${item.is_completed ? 'checked' : ''}></td>
                    <td><input type="text" class="f-title" value="${escapeHtml(item.title || '')}"></td>
                    <td><input type="text" class="f-desc" value="${escapeHtml(item.description || '')}"></td>
                    <td><input type="datetime-local" class="f-start" value="${toLocalInput(item.start_date)}"></td>
                    <td><input type="datetime-local" class="f-end" value="${toLocalInput(item.end_date)}"></td>
                    <td>
                        <select class="f-type">
                            <option value="title" ${item.schedule_type === 'title' ? 'selected' : ''}>title</option>
                            <option value="todo" ${item.schedule_type === 'todo' ? 'selected' : ''}>todo</option>
                            <option value="schedule" ${item.schedule_type === 'schedule' ? 'selected' : ''}>schedule</option>
                            <option value="routine" ${item.schedule_type === 'routine' ? 'selected' : ''}>routine</option>
                        </select>
                    </td>
                    <td><input type="color" class="f-color" value="${item.color || '#5A9FD4'}"></td>
                    <td>${item.created_at || ''}</td>
                    <td>${item.updated_at || ''}</td>
                    <td>
                        <div class="row-actions">
                            <button class="save" onclick="saveRow(${item.id})">저장</button>
                            <button class="del" onclick="deleteRow(${item.id})">삭제</button>
                        </div>
                    </td>
                </tr>
            `).join('');

            document.querySelectorAll('#tbody tr').forEach(row => {
                const id = Number(row.dataset.id);
                if (dirtyIds.has(id)) {
                    row.classList.add('dirty');
                }

                row.querySelectorAll('input, select').forEach(el => {
                    el.addEventListener('change', () => markDirty(id));
                    el.addEventListener('input', () => markDirty(id));
                });
            });

            refreshSaveAllButton();
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        async function saveRow(id) {
            const row = document.querySelector(`tr[data-id="${id}"]`);
            if (!row) return;

            const payload = {
                title: row.querySelector('.f-title').value.trim(),
                description: row.querySelector('.f-desc').value,
                schedule_type: row.querySelector('.f-type').value,
                color: row.querySelector('.f-color').value,
                start_date: row.querySelector('.f-start').value,
                end_date: row.querySelector('.f-end').value || null,
                is_completed: row.querySelector('.f-done').checked
            };

            if (!payload.title || !payload.start_date) {
                alert('title, start_date는 필수입니다.');
                return;
            }

            const res = await fetch(`/api/schedule/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!res.ok) {
                const data = await res.json().catch(() => ({}));
                alert(data.message || '저장 실패');
                return;
            }

            dirtyIds.delete(id);
            await loadRows();
        }

        async function deleteRow(id) {
            if (!confirm('정말 삭제할까요?')) return;

            const res = await fetch(`/api/schedule/${id}`, { method: 'DELETE' });
            if (!res.ok) {
                alert('삭제 실패');
                return;
            }

            schedules = schedules.filter(item => item.id !== id);
            dirtyIds.delete(id);
            renderRows();
        }

        function markDirty(id) {
            dirtyIds.add(Number(id));
            const row = document.querySelector(`tr[data-id="${id}"]`);
            if (row) {
                row.classList.add('dirty');
            }
            refreshSaveAllButton();
        }

        function refreshSaveAllButton() {
            const btn = document.getElementById('saveAllBtn');
            if (!btn) return;
            if (dirtyIds.size > 0) {
                btn.textContent = `일괄 저장 (${dirtyIds.size})`;
                btn.disabled = false;
            } else {
                btn.textContent = '일괄 저장';
                btn.disabled = true;
            }
        }

        function buildPayloadFromRow(id) {
            const row = document.querySelector(`tr[data-id="${id}"]`);
            if (!row) return null;

            return {
                title: row.querySelector('.f-title').value.trim(),
                description: row.querySelector('.f-desc').value,
                schedule_type: row.querySelector('.f-type').value,
                color: row.querySelector('.f-color').value,
                start_date: row.querySelector('.f-start').value,
                end_date: row.querySelector('.f-end').value || null,
                is_completed: row.querySelector('.f-done').checked
            };
        }

        async function saveAllRows() {
            const ids = Array.from(dirtyIds);
            if (!ids.length) {
                return;
            }

            const failed = [];
            for (const id of ids) {
                const payload = buildPayloadFromRow(id);
                if (!payload || !payload.title || !payload.start_date) {
                    failed.push(id);
                    continue;
                }

                const res = await fetch(`/api/schedule/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) {
                    failed.push(id);
                } else {
                    dirtyIds.delete(id);
                }
            }

            await loadRows();
            if (failed.length) {
                alert(`일괄 저장 중 실패: ${failed.join(', ')}`);
            }
        }

        document.getElementById('searchInput').addEventListener('input', renderRows);
        loadRows();
    </script>
</body>
</html>
